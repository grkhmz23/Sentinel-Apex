version: '3.9'

# =============================================================================
# Sentinel Apex — Docker Compose
# =============================================================================
# Development / staging service definitions.
# Production deployments should use a dedicated orchestrator (k8s, ECS, etc.).
# =============================================================================

networks:
  sentinel-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    networks:
      - sentinel-net
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel_apex
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sentinel -d sentinel_apex']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
      target: runner
      args:
        - NODE_ENV=${NODE_ENV:-production}
    container_name: sentinel-api
    restart: unless-stopped
    networks:
      - sentinel-net
    ports:
      - '${API_PORT:-3000}:3000'
      - '${METRICS_PORT:-9090}:9090'
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point at the compose service name
      DATABASE_URL: postgresql://sentinel:sentinel@postgres:5432/sentinel_apex
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
