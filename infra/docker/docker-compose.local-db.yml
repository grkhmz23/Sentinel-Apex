services:
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-apex-local-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel_apex
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - sentinel-apex-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sentinel -d sentinel_apex']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  sentinel-apex-postgres-data:
